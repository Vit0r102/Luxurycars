<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre em Contato | LuxuryCars</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
    <body> 
        <section class="contact-section">
            <div class="contact-container">
                <h2>Entre em Contato</h2>
                <p>Tem alguma dúvida ou interesse? Preencha o formulário abaixo e nossa equipe de especialistas retornará em breve.</p>
                
                <form action="#" method="POST" class="contact-form">
                    
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="seu.email@exemplo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="numero">Telefone / WhatsApp</label>
                        <input type="tel" id="numero" name="numero" placeholder="(67) 12344-7881">
                    </div>
                    
                    <div class="form-group">
                        <label for="assunto">Assunto / Mensagem</label>
                        <textarea id="assunto" name="assunto" rows="5" placeholder="Gostaria de mais informações sobre..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" name="submit" class="btn btn-primary btn-lg luxury-glow">Enviar Mensagem</button>
                    </div>
                </form>
            </div>
        </section>
    </body>
</html>
